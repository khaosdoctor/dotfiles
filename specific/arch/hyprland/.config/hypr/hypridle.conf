general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
    on_lock_cmd = systemctl --user stop --now waybar
    on_unlock_cmd = systemctl --user restart --now waybar
    before_sleep_cmd = systemctl --user stop --now waybar
    after_sleep_cmd = systemctl --user restart --now waybar
}

# Lock first, then DPMS off shortly after.
# This ensures only hyprlock deals with the DPMS resume,
# preventing other apps from losing frame callbacks.
listener {
    timeout = 600
    on-timeout = loginctl lock-session            # lock screen first
}

listener {
    timeout = 620
    on-timeout = hyprctl dispatch dpms off         # turn monitors off after lock is up
    on-resume = hyprctl dispatch dpms on && sleep 0.5 && hyprctl --batch "dispatch focuswindow; dispatch forcerendererreload"  # force clients to redraw
}

listener {
    timeout = 3600
    on-timeout = systemctl suspend                # suspend pc
}
